        - heading "Flooring Excellence" [level=2] [ref=e594]
        - paragraph [ref=e596]: Discover DEECO’s journey from Belgium to Thailand, bringing premium European flooring with unmatched quality and style.
      - generic [ref=e597]:
        - generic [ref=e600]:
          - paragraph [ref=e604]: "1904"
          - generic [ref=e608]:
            - paragraph [ref=e610]: Establishment
            - paragraph [ref=e612]: In 1904, the brothers Auguste and Alphonse Hanssens founded 'Une société en nom collectif' with the name 'A & A Hanssens'. With its registered office at Stroplaan 73 in Ghent.
        - generic [ref=e614]:
          - paragraph [ref=e618]: "1923"
          - generic [ref=e622]:
            - paragraph [ref=e624]: Alphonse Hanssens
            - paragraph [ref=e626]: On September 18, 1923, Auguste Hanssens decided to transfer his shares in the company to his brother Alphonse Hanssens.
        - generic [ref=e628]:
          - paragraph [ref=e632]: "1960"
          - generic [ref=e636]:
            - paragraph [ref=e638]: Port-Arthurlaan
            - paragraph [ref=e640]: "In 1960 it was decided to move the trading activities from Stroplaan to the port area: Port-Arthurlaan 90 in Ghent."
        - generic [ref=e642]:
          - paragraph [ref=e646]: "2005"
          - generic [ref=e650]:
            - paragraph [ref=e652]: Engineered Wooden Flooring Trade
            - paragraph [ref=e654]: In 2005, a trade company specializing in the production of engineered wooden floors was set up in Shanghai, China. Over the course of 20 years, this company collaborated with a network of over 30 factories across China to produce high-quality oak floors for distribution partners in Europe. This extensive production network ensured floors were tailored to meet customer specifications, maintaining a focus on elegance, modernity, and quality.
        - generic [ref=e656]:
          - paragraph [ref=e660]: "2024"
          - generic [ref=e664]:
            - paragraph [ref=e666]: DEECO FLOORS Launch in Pattaya
            - paragraph [ref=e668]: After years of planning and development, the first DEECO FLOORS shop was launched in Pattaya in May 2024, offering a range of premium wooden flooring solutions with a blend of European design and quality craftsmanship.
        - generic [ref=e670]:
          - paragraph [ref=e674]: "2025"
          - generic [ref=e678]:
            - paragraph [ref=e680]: The Deeco Team is Expanding
            - paragraph [ref=e682]: In the year 2025, the Deeco Team experienced a remarkable expansion, which not only increased the number of team members but also contributed to substantial growth and success for the company as a whole. This pivotal moment marked a turning point, allowing Deeco to explore new opportunities and enhance its market presence.
