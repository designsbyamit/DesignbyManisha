    - generic [ref=e435]:
      - heading "Why choose DEECO SPC’s floors (European Affordable Quality)?" [level=3] [ref=e438]
      - generic [ref=e439]:
        - generic [ref=e441]:
          - heading "SPC = Stone Plastic Composite" [level=4] [ref=e443]
          - paragraph [ref=e445]: Made from 70% limestone + 30% PVC — stable, durable, recyclable, and low in emissions. Anti-termite, anti-bacterial, and fire-retardant. Cheaper SPC = 100% PVC — less stable, less durable, higher emissions.
        - generic [ref=e447]:
          - heading "BEST price / quality, BEST deal in Thailand!" [level=4] [ref=e449]
          - paragraph [ref=e451]: Top value for European quality at local prices.
        - generic [ref=e453]:
          - heading "100% Water Resistant" [level=4] [ref=e455]
          - paragraph [ref=e457]: Easy to clean and perfect for all areas.
        - generic [ref=e459]:
          - heading "5G Click-System for Fast & Easy Installation" [level=4] [ref=e461]
          - paragraph [ref=e463]: Latest 5G tech ensures strong, long-lasting locks. Can be installed over existing floors. Cheaper 2G systems loosen over time and may break.
        - generic [ref=e465]:
          - heading "Wear Layer = 0.55mm" [level=4] [ref=e467]
          - paragraph [ref=e469]: Scratch-resistant, pet-friendly, slip-resistant, and UV-resistant. Matt finish — trendy and long-lasting. Cheaper floors = 0.3mm layer — wear out faster
        - generic [ref=e471]:
          - heading "Natural Wood Decors" [level=4] [ref=e473]
          - paragraph [ref=e475]: Realistic wood look with light embossing and at least 5 unique planks for a more natural, non-repetitive appearance.
