      - generic [ref=e56]:
        - paragraph [ref=e58]: Context
        - heading "Healthcare is emotionally different from every other product." [level=2] [ref=e59]
        - paragraph [ref=e60]: When someone interacts with a banking app or a travel booking site, a mistake is inconvenient. When someone interacts with a healthcare product, a missed notification or a buried test result isn't an inconvenience — it's anxiety. It can feel like being abandoned.
        - paragraph [ref=e61]: COVID made this visible to everyone. Telehealth adoption accelerated by a decade in eighteen months. And yet most digital health experiences were built for administrative efficiency — not for the emotional reality of being sick, scared, or simply trying to stay well.
