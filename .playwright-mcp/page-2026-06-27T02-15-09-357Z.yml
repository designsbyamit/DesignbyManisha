          - generic [ref=e569]:
            - paragraph [ref=e570]: What we found
            - paragraph [ref=e571]: "The 'Family Circle' framing resonated deeply. One caregiver said: 'Finally, I'm actually in the system — not just copied on an email.'"
          - generic [ref=e572]:
            - paragraph [ref=e573]: What changed
            - paragraph [ref=e574]: Added explicit confirmation screens when caregivers were granted new access levels, reducing uncertainty about what sharing meant.
