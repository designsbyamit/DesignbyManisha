          - generic [ref=e487]:
            - generic [ref=e488]: "02"
            - heading "Post-visit summaries as a designed experience" [level=3] [ref=e489]
            - generic [ref=e490]:
              - generic [ref=e491]: Challenge
              - paragraph [ref=e492]: Most follow-up care was communicated through an auto-generated PDF or a brief note that arrived with no structure or human warmth.
            - generic [ref=e493]:
              - generic [ref=e494]: Alternatives
              - paragraph [ref=e495]: Standard discharge summary format. Email-only notifications. App push notifications alone.
            - generic [ref=e496]:
              - generic [ref=e497]: Trade-off
              - paragraph [ref=e498]: Required provider workflow changes — doctors needed to generate structured summaries rather than free-form notes.
            - generic [ref=e499]:
              - generic [ref=e500]: Reasoning
              - paragraph [ref=e501]: The gap between appointments was where anxiety lived. A structured, warm, action-oriented follow-up view turned passive patients into confident participants in their own care.
        - generic [ref=e502]:
          - generic [ref=e503]:
            - generic [ref=e504]: "03"
            - heading "Calm information hierarchy over clinical completeness" [level=3] [ref=e505]
            - generic [ref=e506]:
              - generic [ref=e507]: Challenge
              - paragraph [ref=e508]: Healthcare data is extensive. Showing all of it creates a dashboard that feels like a medical chart — complete, but exhausting.
            - generic [ref=e509]:
              - generic [ref=e510]: Alternatives
              - paragraph [ref=e511]: Full data display. Tabbed category views. A search-first approach.
            - generic [ref=e512]:
              - generic [ref=e513]: Trade-off
              - paragraph [ref=e514]: Some clinical information was intentionally not surfaced on the dashboard. Providers initially resisted reducing what patients could see.
            - generic [ref=e515]:
              - generic [ref=e516]: Reasoning
              - paragraph [ref=e517]: Patients didn't need all their information immediately. They needed the right information at the right moment, presented in a way that reduced rather than increased cognitive load.
