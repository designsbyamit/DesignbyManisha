        - heading "Four moments that redirected the design." [level=2] [ref=e225]
      - generic [ref=e226]:
        - generic [ref=e227] [cursor=pointer]:
          - generic [ref=e228]:
            - img [ref=e230]
            - generic [ref=e232]: "01"
          - heading "Patients wanted reassurance more than information." [level=3] [ref=e233]
          - paragraph [ref=e234]: Every participant could access test results online. Almost none felt confident interpreting them. The gap wasn't data — it was context, tone, and a sense that someone was watching over them.
        - generic [ref=e235] [cursor=pointer]:
          - generic [ref=e236]:
            - img [ref=e238]
            - generic [ref=e243]: "02"
          - heading "Families were invisible in most healthcare experiences." [level=3] [ref=e244]
          - paragraph [ref=e245]: The daughter coordinating her mother's appointments was doing the work of a care coordinator — but had no official role in any system. She worked around every tool, not with them.
        - generic [ref=e246] [cursor=pointer]:
          - generic [ref=e247]:
            - img [ref=e249]
            - generic [ref=e251]: "03"
          - heading "People remembered emotional moments, not medical details." [level=3] [ref=e252]
          - paragraph [ref=e253]: Participants recalled exactly how they felt when a doctor rushed them, when a result was buried behind a portal login, when a reminder came too late. Emotional memory outlasts clinical memory.
        - generic [ref=e254] [cursor=pointer]:
          - generic [ref=e255]:
            - img [ref=e257]
            - generic [ref=e259]: "04"
          - heading "The gap between appointments was the most neglected space." [level=3] [ref=e260]
          - paragraph [ref=e261]: Providers focused on the visit. Patients felt most lost between visits. The follow-up care, the action items, the sense that the care was continuing — that was where trust was actually built or broken.
