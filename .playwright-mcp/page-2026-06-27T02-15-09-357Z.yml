          - heading "Complexity became manageable" [level=3] [ref=e746]
          - paragraph [ref=e747]: Three distinct user types — patient, caregiver, provider — unified under one coherent information model.
      - paragraph [ref=e750]: "\"The most meaningful outcome wasn't a usability score. It was that participants stopped talking about the app — and started talking about how they felt. When someone says 'it felt like someone was actually paying attention', that's the design working.\""
