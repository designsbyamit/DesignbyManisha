  - generic [ref=e774]:
    - generic [ref=e776]: Reflection
    - heading "What I took away from this project" [level=2] [ref=e777]
    - generic [ref=e778]:
      - generic [ref=e779]:
        - heading "Domain understanding earns the room" [level=3] [ref=e780]
        - paragraph [ref=e781]: Walking into manufacturing stakeholder workshops as someone who didn't know the difference between a rotor and a stator could have been a disadvantage. I turned it into a strength by asking precise, genuinely curious questions. By the end of the research phase, I was contributing to conversations about operational trade-offs — not just interface questions.
      - generic [ref=e783]:
        - heading "Complexity hides in the workflow, not the interface" [level=3] [ref=e784]
        - paragraph [ref=e785]: The most important design decisions in HexSolve weren't about visual layout or colour. They were about information flow — who sees what, when, and in what state. Getting those right required understanding the workflow deeply enough to see where the real friction was.
      - generic [ref=e787]:
        - heading "A design system is an argument for consistency" [level=3] [ref=e788]
        - paragraph [ref=e789]: Building the design system wasn't just about reusable components. It was about making a case to the organization that consistency has value — that a reviewer and an assembly engineer seeing the same status indicator should see identical visual language, even though their experiences are different.
      - generic [ref=e791]:
        - heading "I'd do something differently" [level=3] [ref=e792]
        - paragraph [ref=e793]: I would involve QA engineers earlier. Their requirements — traceability, full audit history, version locking — were harder to retrofit into an architecture built primarily for authoring and review. Their perspectives would have influenced information architecture decisions made much earlier in the process.
