      - generic [ref=e408]:
        - text: "02"
        - heading "Role-specific interfaces sharing one information model" [level=3] [ref=e409]
        - paragraph [ref=e410]: Authors, reviewers, and engineers need fundamentally different interactions with the same document. Authors need creation and editing tools. Reviewers need approval controls and change indicators. Engineers need clean, uncluttered reading.
        - paragraph [ref=e411]: I separated the action surfaces for each role while keeping the underlying information model identical. This meant no data was duplicated, roles always saw the same content, and each user experienced an interface optimized specifically for their job.
        - generic [ref=e412]: Reduced interface noise for each user while maintaining a consistent information foundation.
    - generic [ref=e413]:
      - generic [ref=e414]:
        - text: "03"
        - heading "Contextual information embedded within each instruction" [level=3] [ref=e415]
        - paragraph [ref=e416]: Engineers assembling an engine at a workstation shouldn't need to switch screens to find the tool specification, part number, or reference image for the step they're on.
        - paragraph [ref=e417]: I designed instruction cards that surface tools, required parts, reference imagery, and the validation checklist inline — scanned at a glance, expanded when needed. Everything for one step, in one place, without navigation.
        - generic [ref=e418]: Eliminated context-switching during precision assembly work.
