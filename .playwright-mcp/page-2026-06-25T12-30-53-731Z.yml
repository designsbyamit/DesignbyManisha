      - generic [ref=e353]: Information Architecture
      - heading "Organising complexity into a structure people already understood" [level=2] [ref=e354]
      - generic [ref=e355]:
        - paragraph [ref=e356]: The document hierarchy wasn't invented — it already existed in how engineers thought about their work. My job was to make that hierarchy navigable rather than invisible.
        - paragraph [ref=e357]: I explored several navigation models including flat lists with filtering, tab-based section navigation, and a collapsible tree panel. The tree panel won not because it was technically impressive but because it matched the way engineers described their documents when they talked about them.
        - paragraph [ref=e358]: The key architectural decision was keeping the hierarchy persistent during instruction authoring — so users never lost their position within a document while editing.
  - generic [ref=e359]:
    - generic [ref=e361]: Interaction Design
    - heading "Three decisions that shaped the experience" [level=2] [ref=e362]
    - generic [ref=e363]:
      - generic [ref=e364]:
        - text: "01"
        - heading "Hierarchical navigation that never loses context" [level=3] [ref=e365]
        - paragraph [ref=e366]: Documents can contain hundreds of instructions across many sections. I designed a persistent sidebar that shows the full document tree while the main area displays the current instruction.
        - paragraph [ref=e367]: This meant users could jump between sections, see their position in the overall document, and return to previous instructions without ever needing to navigate away from the authoring interface. The tree collapses and expands on demand — but your current location is always visible.
        - generic [ref=e368]: Reduced the cognitive effort of navigating complex documents during manufacturing.
