          - paragraph [ref=e136]: What I needed to understand
          - paragraph [ref=e137]: I didn't know how rotary engines were manufactured. That wasn't a weakness — it was an opportunity to ask better questions. I came into stakeholder workshops as a genuine learner.
        - generic [ref=e139]:
          - paragraph [ref=e140]: Stakeholder workshops
          - paragraph [ref=e141]: Three sessions with cross-functional stakeholders helped me map the existing workflow, surface assumptions, and understand where different roles experienced friction. I came away with far more than a requirements list — I came away with a mental model of the operation.
        - generic [ref=e143]:
          - paragraph [ref=e144]: Conversations with authors and engineers
          - paragraph [ref=e145]: Instruction authors described the effort required to maintain consistency across documents. Assembly engineers described the anxiety of starting a job and not being sure if the document in front of them was the latest approved version. These weren't abstract usability concerns — they were operational risks.
        - generic [ref=e147]:
          - paragraph [ref=e148]: Reviewing real documentation
          - paragraph [ref=e149]: Reading actual instruction documents let me understand not just the structure but the cognitive demands they placed on users. Some documents contained hundreds of instructions. Navigation was a real challenge.
