    - heading "What the research actually revealed" [level=2] [ref=e191]
    - generic [ref=e192]:
      - generic [ref=e193]:
        - generic [ref=e194]: "01"
        - paragraph [ref=e195]: No shared source of truth
        - paragraph [ref=e196]: Different roles worked from different versions of the same document. This ambiguity introduced errors and slowed down manufacturing cycles.
      - generic [ref=e197]:
        - generic [ref=e198]: "02"
        - paragraph [ref=e199]: Authoring was time-consuming and error-prone
        - paragraph [ref=e200]: Authors copied structures from previous documents manually. Without a proper authoring tool, consistency depended entirely on individual discipline.
      - generic [ref=e201]:
        - generic [ref=e202]: "03"
        - paragraph [ref=e203]: Reviewers lacked confidence in their approval
        - paragraph [ref=e204]: Without change tracking or visual diffing, reviewers couldn't easily tell what had changed between versions — making approval an uncertain act.
      - generic [ref=e205]:
        - generic [ref=e206]: "04"
        - paragraph [ref=e207]: Assembly engineers needed guidance at the point of action
        - paragraph [ref=e208]: Engineers needed tools and part information exactly when they needed it — not on a separate reference screen. Context switching was costly on the floor.
      - generic [ref=e209]:
        - generic [ref=e210]: "05"
        - paragraph [ref=e211]: QA traceability was fragmented
        - paragraph [ref=e212]: Quality engineers could not directly trace completed work back to approved instruction versions. This created audit gaps and compliance exposure.
      - generic [ref=e213]:
        - generic [ref=e214]: "06"
        - paragraph [ref=e215]: The structure was understood — the interface was not
        - paragraph [ref=e216]: Users understood document hierarchy instinctively because they'd been using it for years. The problem wasn't the model — it was the lack of a tool that represented it clearly.
  - generic [ref=e218]:
    - generic [ref=e220]: Problem Statement
    - blockquote [ref=e221]: "\"Manufacturing teams lacked a single, reliable place to create, review, and execute precision instructions — leaving engineers to work from documents they couldn't fully trust.\""
    - paragraph [ref=e222]: This wasn't a documentation problem. It was a collaboration, traceability, and trust problem — and solving it required a platform that served four distinct user roles simultaneously.
