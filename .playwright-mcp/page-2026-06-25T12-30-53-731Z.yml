      - generic [ref=e61]: Background
      - heading "Manufacturing a rotary engine is not a repeatable process — it is a series of expert decisions executed precisely." [level=2] [ref=e62]
      - paragraph [ref=e63]: Unlike automotive assembly lines where identical parts follow identical steps, rotary engine manufacturing at this scale is driven by individual customer orders. Every engine is unique. Every order triggers a distinct manufacturing project with its own documentation set — detailed instruction documents that become the single source of truth for everyone who touches that engine.
      - paragraph [ref=e64]: Before HexSolve, this documentation existed in disconnected formats — spreadsheets, printed sheets, email threads. Engineers worked from documents that were sometimes outdated, reviewers couldn't track what had changed, and manufacturing teams had no reliable way to confirm they were working from the latest approved version.
